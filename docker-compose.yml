version: '3.8'

services:
  # ========================================
  # MongoDB Service
  # ========================================
  mongodb:
    image: mongo:7.0
    container_name: document_insights_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: document_insights
    networks:
      - app-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # ========================================
  # Redis Service
  # ========================================
  redis:
    image: redis:7.2-alpine
    container_name: document_insights_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========================================
  # FastAPI Application
  # ========================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: document_insights_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./worker:/app/worker
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
      - MONGODB_DB_NAME=document_insights
      - REDIS_URL=redis://redis:6379
      - REDIS_CACHE_TTL=3600
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - LOG_LEVEL=INFO
      - MAX_ACTIVE_JOBS_PER_USER=3
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ========================================
  # Background Worker
  # ========================================
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: document_insights_worker
    restart: unless-stopped
    volumes:
      - ./app:/app/app
      - ./worker:/app/worker
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
      - MONGODB_DB_NAME=document_insights
      - REDIS_URL=redis://redis:6379
      - WORKER_POLL_INTERVAL=2
      - WORKER_MIN_PROCESS_TIME=10
      - WORKER_MAX_PROCESS_TIME=30
      - WORKER_FAILURE_RATE=0.1
      - LOG_LEVEL=INFO
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    command: python -m worker.processor

# ========================================
# Networks
# ========================================
networks:
  app-network:
    driver: bridge

# ========================================
# Volumes
# ========================================
volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local